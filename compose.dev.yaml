services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    command: sh -c "npm install && npm run dev"
    ports:
      - 8080:5173
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NODE_ENV=development
    env_file:
      - .env
    stdin_open: true
    tty: true
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: sh -c "npm install && npm run dev"
    ports:
      - 5050:4000
    volumes:
      - ./server:/app
      - /app/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl --fail --request POST --header ''Content-Type: application/json'' --url ''http://backend:4000'' --data ''{"query":"query { __typename }"}'' || exit 1',
        ]
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      NODE_ENV: development
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_HOST: ${DB_HOST}
      ADEME_API_KEY: ${ADEME_API_KEY}  
      ADEME_API_URL: ${ADEME_API_URL}
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres
    container_name: postgres
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_HOST: ${DB_HOST}
    env_file:
      - .env
    volumes:
      - ./database:/var/lib/postgresql

