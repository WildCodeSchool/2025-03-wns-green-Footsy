services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    command: npm run dev
    ports:
      - 3001:5173
    volumes:
      - ./client/src/:/app/src/
      - ./client/package.json:/app/package.json
      - ./client/vite.config.ts:/app/vite.config.ts
      - ./client/tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
      VITE_URL: http://localhost:3001/
      VITE_URL_GRAPHQL: http://localhost:5051
    env_file:
      - .env
    stdin_open: true
    tty: true
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: npm run dev
    ports:
      - 5051:4000
    volumes:
      - ./server/src:/app/src
      - /app/node_modules
      - ./server/package.json:/app/package.json
      - ./server/tsconfig.json:/app/tsconfig.json
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl --fail --request POST --header ''Content-Type: application/json'' --url ''http://backend:4000'' --data ''{"query":"query { __typename }"}'' || exit 1',
        ]
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
      DB_DATABASE: db_footsy_test
      DB_HOST: database
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres
    container_name: postgres-test
    ports:
      - 5434:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_footsy_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db_footsy_test
      POSTGRES_USER: postgres
      POSTGRES_HOST: database
    env_file:
      - .env
